# Circle — Per-Project Configuration
# Copy this file to: ~/.claude/circle/projects/<project-name>/config.yaml
#
# All fields are optional. Only include what you need to override.

# Custom template directory (in addition to bundled templates)
# templates_dir: /path/to/your/templates/

# Domain override (skip auto-detection: software or general)
# domain: software

# Template variant overrides (force a specific template variant)
# templates:
#   module-architecture: module-architecture-swift  # Force Swift variant

# Optional phases enabled by default for greenfield workflow
# Note: security is always mandatory and cannot be disabled here
greenfield_defaults:
  ux: true
  facilitate: false
  validate_prd: true     # PRD quality validation after refine (default: true since v0.8.0)

# Guardrails — self-verification before handoff
# Roles verify their output covers upstream requirements before completing.
# Adds a Traceability section to output documents.
guardrails:
  self_check: true        # Enable self-verification (default: true)

# ─────────────────────────────────────────────────────────────────

# Test-Driven Development (TDD) enforcement
# TDD is enabled by default. impl uses red-green-refactor cycle via tdd
# for each implementation unit. qa verifies TDD compliance by inspecting commit
# history for test(red): → feat(green): → refactor: pattern.
# When the workflow doesn't involve testable code, impl prompts to disable.
tdd:
  enabled: true           # Enable TDD workflow (default: true)
  enforcement: hard       # hard = QA blocks on violation; soft = QA warns only

# Model & effort routing — assign Claude model and effort level per role
# Roles with context: fork run as subagents and respect these settings.
# Roles with context: same inherit the session model (settings are ignored).
#
# As of v2.1.0, the plugin pins specific Claude model IDs per role (not family
# aliases) for cost predictability. The values below mirror the v2.1.0 defaults —
# you only need to keep entries you actually want to OVERRIDE. Remove any role
# block to fall back to the plugin default. See CLAUDE.md "Pinned models — current".
#
# Override accepts a pinned ID (e.g. claude-opus-4-6, recommended) or a family
# alias (opus/sonnet/haiku — resolves to latest on Anthropic API, previous-major
# on Bedrock/Vertex unless you set ANTHROPIC_DEFAULT_OPUS_MODEL etc).
#
# Effort levels: low, medium, high, max. Do NOT use xhigh — it is Opus 4.7-only
# and the plugin pins Opus 4.6.
# Effort precedence: config.yaml > session-state.json > skill frontmatter default.
#
# Role overrides — add model, effort, extra context, or instructions per role
agents:
  scope:
    model: claude-sonnet-4-6
    effort: medium
  refine:
    model: claude-sonnet-4-6
    effort: medium
  arch:
    model: claude-opus-4-6
    effort: high
    # Additional files to read for architectural context
    context_files:
      - docs/ARCHITECTURE.md
      - docs/ADR/
    # Extra instructions appended to the role's prompt
    extra_instructions: |
      This project uses a layered architecture with dependency injection.
      All new modules must follow the existing pattern.
  validate-prd:
    model: claude-sonnet-4-6
    effort: low
  security:
    model: claude-opus-4-6
    effort: high
  facilitate:
    model: claude-haiku-4-5-20251001
    effort: low
  impl:
    model: claude-opus-4-6
    effort: high
    context_files:
      - src/
    extra_instructions: |
      Follow project coding standards and existing conventions.
      All public APIs must have documentation comments.
  qa:
    model: claude-sonnet-4-6
    effort: medium
    extra_instructions: |
      Minimum test coverage target: 80%.
      Focus on integration tests for data flows.
  ux:
    model: claude-sonnet-4-6
    effort: medium
    extra_instructions: |
      Follow platform design guidelines.
      Support accessibility features.

# Parallel implementation — worktree-based parallel execution of sharded tasks
# When work items are sharded (via /circle:shard), greenfield can implement
# independent tasks in parallel using git worktrees.
# Requires: shards/tasks/ with ≥2 task files.
parallel:
  enabled: true           # Enable parallel impl (default: true)
  max_agents: 3           # Max concurrent worktree agents (default: 3)

# Code review agent models (code-review spawns 2 parallel agents).
# As of v2.1.0, the plugin pins these to specific Claude model IDs.
# The values below mirror the v2.1.0 defaults; only modify what you want to override.
# Prefer the nested form (agent_a.model / agent_a.effort); the flat form
# (agent_a_model) is still honoured as legacy fallback.
code_review:
  agent_a:
    model: claude-sonnet-4-6        # Standards & Bugs
    effort: medium
  agent_b:
    model: claude-haiku-4-5-20251001  # Security
    effort: medium
  platform_review:
    model: claude-sonnet-4-6        # iOS / language-specific platform review (when matched)
    effort: medium

# Linear project mapping (for MCP integration)
# linear:
#   team: "My Team"
#   project: "My Project"

# claude-mem project name (for memory search scoping)
# memory_project: "my-project"

# Dependency overrides (optional)
# Override which dependencies are installed for this project.
# See deps-manifest.yaml for the full list of available dependencies.
# dependencies:
#   notion: include          # Include an extra that's off by default
#   claude-mem:              # Replace a default with an alternative
#     skip: true
#     alternative:
#       name: "my-custom-memory"
#       type: plugin
#       marketplace: my-marketplace
#       install: "claude plugin install my-custom-memory@my-marketplace"
